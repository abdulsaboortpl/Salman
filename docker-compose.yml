# =============================================================================
# VPS PRODUCTION — pull images from GHCR, use YOUR existing SQL Server on :1433
# =============================================================================
# DO NOT use docker-compose.dev.yml on VPS (that file is for local dev only).
#
# Setup:
#   cp .env.example .env   && edit .env
#   docker compose pull
#   docker compose up -d
# =============================================================================

services:
  api:
    image: ghcr.io/abdulsaboortpl/auth-api:${IMAGE_TAG:-latest}
    container_name: auth-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DisableHttpsRedirection: "true"
      EnableSwagger: ${ENABLE_SWAGGER:-false}
      ConnectionStrings__DefaultConnection: "Server=${DB_HOST:-host.docker.internal},${DB_PORT:-1433};Database=${DB_NAME:-SalmanDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;Encrypt=False"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER:-AuthAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-AuthAPIClient}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_EXPIRY:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_EXPIRY:-7}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost}
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    image: ghcr.io/abdulsaboortpl/auth-frontend:${IMAGE_TAG:-latest}
    container_name: auth-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge
