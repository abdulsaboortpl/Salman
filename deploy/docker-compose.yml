# =============================================================================
# VPS Deployment — uses SQL Server on the VPS host (localhost:1433)
# =============================================================================
# Usage on VPS:
#   1. Copy this folder to your VPS
#   2. cp .env.example .env  &&  edit .env
#   3. docker login ghcr.io -u YOUR_GITHUB_USERNAME -p YOUR_GITHUB_PAT
#   4. docker compose pull && docker compose up -d
#
# SQL Server must already be running on the VPS at port 1433.
# The API container reaches it via host.docker.internal:1433
# EF Core migrations run automatically on API startup.
# =============================================================================

services:
  api:
    image: ${REGISTRY}/auth-api:${IMAGE_TAG:-latest}
    container_name: auth-api
    restart: unless-stopped
    extra_hosts:
      # Lets the container reach SQL Server on the VPS host (localhost:1433)
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DisableHttpsRedirection: "true"
      EnableSwagger: ${ENABLE_SWAGGER:-false}
      ConnectionStrings__DefaultConnection: "Server=${DB_HOST},${DB_PORT};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true;Encrypt=False"
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER:-AuthAPI}
      JwtSettings__Audience: ${JWT_AUDIENCE:-AuthAPIClient}
      JwtSettings__AccessTokenExpirationMinutes: ${JWT_ACCESS_EXPIRY:-60}
      JwtSettings__RefreshTokenExpirationDays: ${JWT_REFRESH_EXPIRY:-7}
      Cors__AllowedOrigins__0: ${FRONTEND_URL:-http://localhost}
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    image: ${REGISTRY}/auth-frontend:${IMAGE_TAG:-latest}
    container_name: auth-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - auth-network

networks:
  auth-network:
    driver: bridge
