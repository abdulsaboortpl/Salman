# =============================================================================
# LOCAL DEV ONLY — build from source on your PC
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# NOT for VPS. On VPS use: docker compose up -d  (uses docker-compose.yml)
# =============================================================================

services:
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: auth-api-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DisableHttpsRedirection: "true"
      EnableSwagger: "true"
      ConnectionStrings__DefaultConnection: "Server=${DB_HOST:-host.docker.internal},${DB_PORT:-1433};Database=${DB_NAME:-SalmanDB};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
      JwtSettings__Secret: ${JWT_SECRET:-YourSuperSecretKeyForJWT_MustBeAtLeast32Characters!}
      Cors__AllowedOrigins__0: "http://localhost"
      Cors__AllowedOrigins__1: "http://localhost:8080"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: auth-frontend-dev
    ports:
      - "8080:80"
    depends_on:
      - api
